kind = "data-app"
previewPath = "/"
title = "Biodiversity Benchmark"
version = "1.0.0"
id = "artifacts/benchmark-ui"
router = "path"

[[integratedSkills]]
name = "data-visualization"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24834

[services.development]
run = "pnpm --filter @workspace/benchmark-ui run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/benchmark-ui", "run", "build" ]
publicDir = "artifacts/benchmark-ui/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24834"
BASE_PATH = "/"
